<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF MAX Profile</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;
}

/* RGB Animation */
@keyframes rgb {
    0%{border-color:red; box-shadow:0 0 20px red;}
    33%{border-color:lime; box-shadow:0 0 20px lime;}
    66%{border-color:blue; box-shadow:0 0 20px blue;}
    100%{border-color:red; box-shadow:0 0 20px red;}
}

.header{
    padding:20px;
    font-size:28px;
    font-weight:bold;
    background:linear-gradient(90deg, red, blue, lime);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.profile-box{
    margin:50px auto;
    width:90%;
    max-width:400px;
    background:#111;
    padding:30px;
    border-radius:15px;
    border:3px solid red;
    animation:rgb 3s infinite linear;
}

.profile-box h2{
    margin-bottom:20px;
}

.info{
    margin:15px 0;
    padding:12px;
    background:#222;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="header">
FREE FIRE MAX
</div>

<div class="profile-box">
<h2>PROFILE</h2>

<div class="info"><b>NAME:</b> ᏳꫝɭꫝӾƳ-Ɓoყ+3</div>
<div class="info"><b>ID:</b> 7813244621</div>
<div class="info"><b>LEVEL:</b> 66</div>

</div>

</body>
</html>
